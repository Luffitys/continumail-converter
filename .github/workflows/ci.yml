name: CI

# CI (right-sized, advisory): build + test the engine on Windows (engine uses Windows-only PST
# APIs) and run the desktop frontend unit tests (Vitest). Both jobs run on windows-latest — the
# only supported platform — for every push and PR to master (private repo) and main (public repo).
# See docs/repo-health-roadmap.md §3. Remaining optional add-on: a hygiene grep step.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Avoid piling up redundant runs on rapid pushes to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (engine)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build (Release)
        run: dotnet build Mail2Pst.sln -c Release

      - name: Test (Release)
        run: dotnet test Mail2Pst.sln -c Release --no-build

  desktop-test:
    name: Test (desktop frontend)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install (npm ci)
        working-directory: desktop
        run: npm ci

      - name: Test (Vitest)
        working-directory: desktop
        run: npm test

  desktop-rust:
    name: Test (desktop Rust)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Build the CLI so the Rust sidecar-integration tests find Mail2Pst.Cli.dll
      # (via locate_cli's dotnet fallback) and RUN instead of self-skipping.
      - name: Build CLI (Release)
        run: dotnet build src/Mail2Pst.Cli -c Release

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # tauri-build (the app crate's build script) requires the frontendDist (../dist)
      # to exist; build the real frontend assets so `cargo test` can compile the crate.
      - name: Build frontend dist
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test
        working-directory: desktop/src-tauri
        run: cargo test --locked
